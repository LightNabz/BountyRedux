name: BountyRedux
version: '${project.version}'
main: dev.bountyredux.BountiesPlugin
api-version: '1.21'
description: GPLv3 Bounty plugin — open source replica inspired by DonutSMP.
authors: [ LightNabz ]
website: https://github.com/LightNabz/BountyRedux

depend:
  - Vault

softdepend:
  - EssentialsX

commands:
  bounty:
    description: Main bounty command.
    usage: /bounty [add|search|clear|reload]
    permission: bounties.use

permissions:
  bounties.use:
    description: Allows opening the bounty menu.
    default: true
  bounties.add:
    description: Allows adding a bounty on a player.
    default: true
  bounties.search:
    description: Allows searching a player's bounties.
    default: true
  bounties.clear:
    description: Allows clearing a player's bounty (admin).
    default: op
  bounties.reload:
    description: Allows reloading the plugin config.
    default: op
  bounties.admin:
    description: Grants full admin access.
    default: op
  bounties.*:
    description: Gives every permission in the plugin.
    default: op
    children:
      bounties.use: true
      bounties.add: true
      bounties.search: true
      bounties.clear: true
      bounties.reload: true
      bounties.admin: true
